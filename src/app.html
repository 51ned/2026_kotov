<!doctype html>


<html lang='ru'>
	<head>
		<meta charset='utf-8' />
		<meta name='viewport' content='width=device-width, initial-scale=1' />
		<meta name='text-scale' content='scale' />
    
    <link
      as='font'
      crossorigin
      href='/fonts/ibm-plex-sans-400.woff2'
      type='font/woff2'
    >
    <link
      as='font'
      crossorigin
      rel='preload'
      href='/fonts/ibm-plex-sans-600.woff2'
      type='font/woff2'
    >
    <link
      as='font'
      crossorigin
      rel='preload'
      href='/fonts/ibm-plex-sans-italic.woff2'
      type='font/woff2'
    >

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data='hover'>
		<div style='display: contents'>
      %sveltekit.body%
    </div>

    <script>
      (async () => {
        await Promise.all([
          document.fonts.load('400 1em "IBM Plex Sans"'),
          document.fonts.load('600 1em "IBM Plex Sans"'),
          document.fonts.load('italic 400 1em "IBM Plex Sans"')
        ]);

        document.documentElement.classList.add('fonts-loaded')
      })()
    </script>
	</body>
</html>
